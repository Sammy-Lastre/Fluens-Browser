<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Settings</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            padding: 32px;
            background: Canvas;
            color: CanvasText;
        }

        .card {
            max-width: 700px;
            border: 1px solid GrayText;
            border-radius: 8px;
            padding: 20px;
        }

        h1 {
            margin-top: 0;
            font-size: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>On startup</h1>

        <label class="option">
            <input type="radio" name="startup" value="OpenNewTab" __OPEN_NEW_TAB_CHECKED__ />
            <span>Open the New tab page</span>
        </label>

        <label class="option">
            <input type="radio" name="startup" value="RestoreOpenTabs" __RESTORE_OPEN_TABS_CHECKED__ />
            <span>Continue where you left off</span>
        </label>

        <label class="option">
            <input type="radio" name="startup" value="RestoreAndOpenNewTab" __RESTORE_AND_OPEN_NEW_TAB_CHECKED__ />
            <span>Continue where you left off and open a New Tab page</span>
        </label>
    </div>

    <script>
        for (const radio of document.querySelectorAll('input[name="startup"]')) {
            radio.addEventListener('change', event => {
                window.chrome.webview.postMessage({
                    type: 'settings:setOnStartup',
                    value: event.target.value
                });
            });
        }
    </script>
</body>
</html>
